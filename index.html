<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ancient Holi Greetings</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;500&display=swap');

body{
    margin:0;
    padding:0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #3a1c71, #000);
    color:white;
    overflow:hidden;
}

/* Ancient Border */
.main-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:600px;
    padding:40px;
    text-align:center;
    border:5px solid gold;
    border-radius:25px;
    box-shadow:0 0 40px gold;
    background:rgba(0,0,0,0.6);
}

/* Heading Style */
h1{
    font-family:'Cinzel', serif;
    font-size:32px;
    color:gold;
    text-shadow:0 0 10px orange;
}

/* Floating Text Animation */
.floating{
    animation: floatText 3s ease-in-out infinite;
}

@keyframes floatText{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

/* Button Style */
button{
    padding:10px 20px;
    margin-top:20px;
    border:none;
    border-radius:20px;
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:orange;
    transform:scale(1.1);
}

/* Input Style */
input{
    padding:10px;
    width:80%;
    border-radius:20px;
    border:none;
    margin-top:20px;
    text-align:center;
}

/* Floating Colors */
.color{
    position:absolute;
    width:100px;
    height:100px;
    border-radius:50%;
    opacity:0.5;
    filter:blur(30px);
    animation: move 10s linear infinite;
}

@keyframes move{
    0%{transform:translateY(0);}
    100%{transform:translateY(-1000px);}
}

.color:nth-child(1){background:red; left:10%;}
.color:nth-child(2){background:blue; left:40%;}
.color:nth-child(3){background:yellow; left:70%;}
</style>
</head>

<body>

<div class="color"></div>
<div class="color"></div>
<div class="color"></div>

<div class="main-box" id="content"></div>

<script>
const content = document.getElementById("content");
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(!name){
    content.innerHTML = `
        <h1>Enter Your Name</h1>
        <input type="text" id="username" placeholder="Type your name...">
        <br>
        <button onclick="generateLink()">Create Greeting</button>
    `;
}else{
    content.innerHTML = `
        <h1 class="floating">🌸 Happy Holi 🌸</h1>
        <p>"रंगों का त्योहार आपके जीवन में खुशियाँ भर दे।"</p>
        <p>"May your life be as colorful as Holi."</p>
        <h2 style="color:gold;">${name} wishes you Happy Holi 🎉</h2>
        <button onclick="createNew()">Create Your Own Greeting</button>
    `;
}

function generateLink(){
    const username = document.getElementById("username").value.trim();
    if(username){
        window.location.href = window.location.pathname + "?name=" + encodeURIComponent(username);
    }
}

function createNew(){
    window.location.href = window.location.pathname;
}
</script>

</body>
</html>
