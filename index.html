<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Holi Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    /* Footer Credit */
.footer-credit{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    text-align:center;
    padding:10px 0;
    font-size:14px;
    font-family:'Cinzel',serif;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(6px);
    color:gold;
    letter-spacing:2px;
    box-shadow:0 -2px 20px rgba(255,215,0,0.3);
    z-index:10;
    animation: glowFooter 2s infinite alternate;
}

@keyframes glowFooter{
    from{ text-shadow:0 0 5px gold; }
    to{ text-shadow:0 0 15px orange, 0 0 25px red; }
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#1a0033,#000);
    color:white;
    overflow-x:hidden;
}

/* Animated Gulal Particles */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* Sections */
section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:60px 20px;
}

/* Royal Frame */
.frame{
    border:6px double gold;
    padding:50px;
    border-radius:40px;
    background:rgba(0,0,0,0.65);
    box-shadow:0 0 50px rgba(255,215,0,0.5);
    max-width:900px;
}

/* Huge Name */
.hero-name{
    font-family:'Cinzel',serif;
    font-size:90px;
    color:gold;
    letter-spacing:5px;
    text-shadow:0 0 20px orange,0 0 60px red;
    animation: fadeScale 2s ease forwards;
}

@keyframes fadeScale{
    from{opacity:0; transform:scale(0.5);}
    to{opacity:1; transform:scale(1);}
}

/* Quotes */
.quote{
    font-family:'Playfair Display',serif;
    font-size:26px;
    margin:20px 0;
    line-height:1.6;
    animation: fadeIn 4s infinite alternate;
}

@keyframes fadeIn{
    from{opacity:0.6;}
    to{opacity:1;}
}

/* Button */
button{
    margin-top:30px;
    padding:14px 30px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,gold,orange);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px gold;
}

/* Input */
input{
    padding:14px;
    width:80%;
    border-radius:30px;
    border:none;
    text-align:center;
    margin-top:20px;
    font-size:16px;
}

/* Scroll Indicator */
.scroll{
    margin-top:40px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(15px);}
}

</style>
</head>

<body>

<canvas id="gulal"></canvas>

<div id="app"></div>

<script>

/* Gulal Particle Animation */
const canvas = document.getElementById("gulal");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<150;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*6,
        speedY:Math.random()*2+0.5,
        color:`hsl(${Math.random()*360},100%,50%)`
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
        p.y+=p.speedY;
        if(p.y>canvas.height) p.y=0;
    });
    requestAnimationFrame(animate);
}
animate();

/* Name Logic */
const app = document.getElementById("app");
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(!name){
    app.innerHTML = `
    <section>
        <div class="frame">
            <h1 style="font-family:Cinzel;color:gold;">Enter Your Royal Name</h1>
            <input type="text" id="username" placeholder="Type your name...">
            <br>
            <button onclick="create()">Create Your Holi Experience</button>
        </div>
    </section>
    `;
}else{
    app.innerHTML = `
    <section>
        <h1 class="hero-name">${name}</h1>
        <div class="scroll">⬇ Scroll to Celebrate ⬇</div>
    </section>

    <section>
        <div class="frame">
            <div class="quote">"रंगों का यह पर्व आपके जीवन में नई ऊर्जा और आनंद भर दे।"</div>
            <div class="quote">"May the colors of Holi paint your life with joy and prosperity."</div>
        </div>
    </section>

    <section>
        <div class="frame">
            <h2>${name} Wishes You</h2>
            <h1 style="font-family:Cinzel;color:gold;font-size:60px;">HAPPY HOLI 🎉</h1>
            <button onclick="reset()">Create Your Own Greeting</button>
        </div>
    </section>
    `;
}

function create(){
    const username = document.getElementById("username").value.trim();
    if(username){
        window.location.href = window.location.pathname + "?name=" + encodeURIComponent(username);
    }
}

function reset(){
    window.location.href = window.location.pathname;
}

</script>
<div class="footer-credit">
    ✨ Made by Anosmish ✨
</div>
</body>
</html>
