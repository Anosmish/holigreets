<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Holi Greeting</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(to bottom,#2b1055,#000);
    color:white;
    overflow-x:hidden;
}

/* Floating Color Balls */
.color{
    position:fixed;
    width:150px;
    height:150px;
    border-radius:50%;
    opacity:0.4;
    filter:blur(60px);
    animation: floatUp 20s linear infinite;
}

.color:nth-child(1){background:red; left:10%; animation-delay:0s;}
.color:nth-child(2){background:blue; left:40%; animation-delay:5s;}
.color:nth-child(3){background:yellow; left:70%; animation-delay:10s;}

@keyframes floatUp{
    0%{top:100%;}
    100%{top:-20%;}
}

/* Sections */
section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:40px;
}

/* Ancient Border */
.box{
    border:5px solid gold;
    padding:40px;
    border-radius:30px;
    box-shadow:0 0 30px gold;
    background:rgba(0,0,0,0.6);
    width:90%;
    max-width:800px;
}

/* Big Name Style */
.big-name{
    font-family:'Cinzel',serif;
    font-size:70px;
    color:gold;
    text-shadow:0 0 20px orange, 0 0 40px red;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px gold;}
    to{text-shadow:0 0 40px red;}
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:orange;
    transform:scale(1.1);
}

input{
    padding:12px;
    width:80%;
    border-radius:25px;
    border:none;
    text-align:center;
    margin-top:20px;
}

.quote{
    font-size:22px;
    margin:20px 0;
    animation: fadeIn 3s ease-in-out infinite alternate;
}

@keyframes fadeIn{
    from{opacity:0.5;}
    to{opacity:1;}
}

.scroll-down{
    margin-top:20px;
    font-size:18px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(10px);}
}
</style>
</head>

<body>

<div class="color"></div>
<div class="color"></div>
<div class="color"></div>

<div id="mainContent"></div>

<script>
const main = document.getElementById("mainContent");
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(!name){
    main.innerHTML = `
    <section>
        <div class="box">
            <h1 style="color:gold;font-family:Cinzel;">Enter Your Name</h1>
            <input type="text" id="username" placeholder="Type your name...">
            <br>
            <button onclick="generate()">Create Royal Greeting</button>
        </div>
    </section>
    `;
}else{
    main.innerHTML = `
    <section>
        <h1 class="big-name">${name}</h1>
        <div class="scroll-down">⬇ Scroll Down ⬇</div>
    </section>

    <section>
        <div class="box">
            <h2 style="color:gold;">🌸 Happy Holi 🌸</h2>
            <p class="quote">"रंगों का त्योहार आपके जीवन को खुशियों से भर दे।"</p>
            <p class="quote">"May your life be filled with vibrant colors of happiness."</p>
        </div>
    </section>

    <section>
        <div class="box">
            <h2>${name} wishes you</h2>
            <h1 style="color:gold;font-size:50px;">Happy Holi 🎉</h1>
            <button onclick="resetPage()">Create Your Own Greeting</button>
        </div>
    </section>

    <section>
        <div class="box">
            <h2>Celebrate the Festival of Colors</h2>
            <p class="quote">Let joy burst like colors in the sky!</p>
        </div>
    </section>
    `;
}

function generate(){
    const username = document.getElementById("username").value.trim();
    if(username){
        window.location.href = window.location.pathname + "?name=" + encodeURIComponent(username);
    }
}

function resetPage(){
    window.location.href = window.location.pathname;
}
</script>

</body>
</html>
