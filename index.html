<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ancient Holi Greetings</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --maroon: #4a0404;
            --parchment: #f4e4bc;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2a0202;
            background-image: radial-gradient(circle, #4a0404 0%, #000000 100%);
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-align: center;
        }

        /* Ancient Frame Container */
        .card {
            border: 15px solid transparent;
            border-image: linear-gradient(to bottom right, #d4af37, #8b4513, #d4af37) 30;
            padding: 40px;
            background: var(--parchment);
            color: var(--maroon);
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; margin-bottom: 20px; }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
            border: 2px solid var(--maroon);
            background: transparent;
            font-family: inherit;
            color: var(--maroon);
        }

        button {
            padding: 10px 20px;
            background: var(--maroon);
            color: var(--gold);
            border: none;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover { background: #7a0a0a; }

        #greeting-area { display: none; }
        #input-area { display: block; }
    </style>
</head>
<body>

<div class="card">
    <div id="input-area">
        <h1>Welcome</h1>
        <p>Enter your name to create your blessing:</p>
        <input type="text" id="name-input" placeholder="Your Name">
        <br>
        <button onclick="setName()">Generate Wish</button>
    </div>

    <div id="greeting-area">
        <div class="floating">
            <h1>Happy Holi!</h1>
            <p id="message"></p>
        </div>
        <button onclick="clearName()">Create Your Own</button>
    </div>
</div>

<script>
    const inputArea = document.getElementById('input-area');
    const greetingArea = document.getElementById('greeting-area');
    const nameDisplay = document.getElementById('message');
    const inputField = document.getElementById('name-input');

    // Check URL for name
    const urlParams = new URLSearchParams(window.location.search);
    const userName = urlParams.get('name');

    if (userName) {
        showGreeting(userName);
    }

    function setName() {
        const name = inputField.value;
        if (name) {
            window.location.search = `?name=${encodeURIComponent(name)}`;
        }
    }

    function showGreeting(name) {
        inputArea.style.display = 'none';
        greetingArea.style.display = 'block';
        
        // Hindi & English Message
        const greetingText = `
            रंगों का यह त्यौहार आपके जीवन में खुशियाँ लाए।<br>
            <strong>${name}</strong>, wishing you a vibrant and colorful Holi filled with love and prosperity!
        `;
        nameDisplay.innerHTML = greetingText;
    }

    function clearName() {
        window.location.href = window.location.pathname;
    }
</script>

</body>
</html>
