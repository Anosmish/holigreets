<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Holi Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    /* Footer Credit */
.footer-credit{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    text-align:center;
    padding:10px 0;
    font-size:14px;
    font-family:'Cinzel',serif;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(6px);
    color:gold;
    letter-spacing:2px;
    box-shadow:0 -2px 20px rgba(255,215,0,0.3);
    z-index:10;
    animation: glowFooter 2s infinite alternate;
}

    @keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(5px,5px); }
  50% { transform: translate(-5px,5px); }
  75% { transform: translate(5px,-5px); }
  100% { transform: translate(0,0); }
}

.shake {
  animation: shake 0.5s;
}


    .burst {
    position:fixed;
    width:20px;
    height:20px;
    border-radius:50%;
    pointer-events:none;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    to {
        transform:translate(var(--x), var(--y));
        opacity:0;
    }
}

@keyframes glowFooter{
    from{ text-shadow:0 0 5px gold; }
    to{ text-shadow:0 0 15px orange, 0 0 25px red; }
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#1a0033,#000);
    color:white;
    overflow-x:hidden;
}

/* Animated Gulal Particles */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* Sections */
section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:60px 20px;
}

/* Royal Frame */
.frame{
    border:6px double gold;
    padding:50px;
    border-radius:40px;
    background:rgba(0,0,0,0.65);
    box-shadow:0 0 50px rgba(255,215,0,0.5);
    max-width:900px;
}

/* Huge Name */
.hero-name{
    font-family:'Cinzel',serif;
    font-size:90px;
    color:gold;
    letter-spacing:5px;
    text-shadow:0 0 20px orange,0 0 60px red;
    animation: fadeScale 2s ease forwards;
}

@keyframes fadeScale{
    from{opacity:0; transform:scale(0.5);}
    to{opacity:1; transform:scale(1);}
}

/* Quotes */
.quote{
    font-family:'Playfair Display',serif;
    font-size:26px;
    margin:20px 0;
    line-height:1.6;
    animation: fadeIn 4s infinite alternate;
}

@keyframes fadeIn{
    from{opacity:0.6;}
    to{opacity:1;}
}

/* Button */
button{
    margin-top:30px;
    padding:14px 30px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,gold,orange);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px gold;
}

/* Input */
input{
    padding:14px;
    width:80%;
    border-radius:30px;
    border:none;
    text-align:center;
    margin-top:20px;
    font-size:16px;
}

/* Scroll Indicator */
.scroll{
    margin-top:40px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(15px);}
}

</style>
</head>

<body>

<canvas id="gulal"></canvas>

<div id="app"></div>

<script>

/* Gulal Particle Animation */
const canvas = document.getElementById("gulal");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<150;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*6,
        speedY:Math.random()*2+0.5,
        color:`hsl(${Math.random()*360},100%,50%)`
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
        p.y+=p.speedY;
        if(p.y>canvas.height) p.y=0;
    });
    requestAnimationFrame(animate);
}
animate();

/* Name Logic */
const app = document.getElementById("app");
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(!name){
    app.innerHTML = `
    <section>
        <div class="frame">
            <h1 style="font-family:Cinzel;color:gold;">Enter Your Royal Name</h1>
            <input type="text" id="username" placeholder="Type your name...">
            <br>
            <button onclick="create()">Create Your Holi Experience</button>
        </div>
    </section>
    `;
}else{
    app.innerHTML = `
    <section id="intro">
    <h1 class="hero-name">${name}</h1>

    <div class="frame" style="margin-top:40px;">
        <h2 style="color:gold;font-family:Cinzel;">
            ने आपके लिए होली का संदेश भेजा है 🎨
        </h2>

        <p class="quote">
            नीचे दिए गए बटन पर क्लिक करके देखें
        </p>

        <button onclick="goNext()">संदेश देखें</button>
    </div>
</section>

    <section>
        <div class="frame">
            <h2 style="color:gold;font-family:Cinzel;">रंगों का पावन उत्सव</h2>
            <div class="quote">
            होली केवल रंगों का त्योहार नहीं,
            यह दिलों को जोड़ने और रिश्तों को रंगने का पर्व है।
            </div>
            <div class="quote">
            यह दिन है गिले-शिकवे मिटाने का,
            खुशियों को गले लगाने का।
            </div>
        </div>
    </section>

    <section id="messageSection">
        <div class="frame">
            <h2 style="color:gold;">${name} की ओर से शुभकामनाएँ</h2>
            <h1 style="font-family:Cinzel;color:gold;font-size:60px;">
            आपको और आपके परिवार को <br> होली की हार्दिक शुभकामनाएँ 🎉
            </h1>
            <p class="quote">
            ईश्वर आपके जीवन को खुशियों, प्रेम और सफलता के रंगों से भर दे।
            </p>
        </div>
    </section>

    <section>
        <div class="frame">
            <h2 style="color:gold;font-family:Cinzel;">होली का संदेश</h2>
            <p class="quote">
            रंगों की बौछार, अपनों का प्यार,
            मुबारक हो आपको होली का त्यौहार।
            </p>
            <p class="quote">
            हर दिन हो आपके जीवन में बसंत,
            हर पल हो खुशियों से संत।
            </p>
        </div>
    </section>

    <!-- YouTube Embed Section -->
    <section>
        <div class="frame">
            <h2 style="color:gold;font-family:Cinzel;">🎥 होली उत्सव विशेष वीडियो 🎥</h2>

            <!-- Replace VIDEO_ID with your YouTube video ID -->
            <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:20px;box-shadow:0 0 20px gold;">
    <iframe 
        id="holiVideo"
        src=""
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen
        style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:20px;">
    </iframe>
</div>

            <p style="margin-top:20px;font-size:14px;opacity:0.8;">
            (यहाँ आप अपना YouTube video ID डाल सकते हैं)
            </p>

        </div>
    </section>

    <section>
        <div class="frame">
            <button onclick="reset()">अपना स्वयं का होली संदेश बनाएं</button>
            <br>
            <button onclick="shareWhatsApp()">WhatsApp पर Share करें</button>
        </div>
    </section>
    `;
}

    function shareWhatsApp(){
    const name = new URLSearchParams(window.location.search).get("name");
    const url = window.location.href;
    const message = `${name} ने आपको होली की शुभकामनाएँ भेजी हैं 🎨🌸\n\nदेखें यहाँ:\n${url}`;
    const whatsappURL = "https://wa.me/?text=" + encodeURIComponent(message);
    window.open(whatsappURL, "_blank");
    }

    function goNext(){

    const name = new URLSearchParams(window.location.search).get("name");

    // 🎶 Play Dhol
    const sound = document.getElementById("dholSound");
    sound.play();

    // ✨ Screen Shake
    document.body.classList.add("shake");
    setTimeout(()=> document.body.classList.remove("shake"), 500);

    // 💥 Color Burst
    for(let i=0;i<40;i++){
        const burst = document.createElement("div");
        burst.className="burst";
        burst.style.background=`hsl(${Math.random()*360},100%,50%)`;
        burst.style.left=window.innerWidth/2+"px";
        burst.style.top=window.innerHeight/2+"px";
        burst.style.setProperty("--x",(Math.random()*600-300)+"px");
        burst.style.setProperty("--y",(Math.random()*600-300)+"px");
        document.body.appendChild(burst);
        setTimeout(()=>burst.remove(),1000);
    }

    // 🎥 Load YouTube Autoplay After Click
    document.getElementById("holiVideo").src =
    "https://www.youtube.com/embed/87FYp3YLEBM?autoplay=1&mute=1&controls=0";

    // Smooth Scroll
    document.querySelector("#messageSection").scrollIntoView({
        behavior:"smooth"
    });
    }

function create(){
    const username = document.getElementById("username").value.trim();
    if(username){
        window.location.href = window.location.pathname + "?name=" + encodeURIComponent(username);
    }
}

function reset(){
    window.location.href = window.location.pathname;
}

</script>

    <audio id="dholSound" src="https://assets.mixkit.co/active_storage/sfx/2021/2021-preview.mp3"></audio>
<div class="footer-credit">
    ✨ Made by Anosmish ✨
</div>
</body>
</html>
